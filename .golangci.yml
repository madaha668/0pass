version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - bodyclose
    - gosec
    - misspell

  settings:
    errcheck:
      # Writing to stdout/stderr is not actionable — ignore fmt write errors.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    gosec:
      excludes:
        - G304  # file path from variable — intentional in vault load/save

